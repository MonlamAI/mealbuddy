services:
  postgres:
    image: postgres:16-alpine
    container_name: mealbuddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mealbuddy
      POSTGRES_USER: mealbuddy
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: mealbuddy-backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www


  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mealbuddy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.production
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: mealbuddy-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

volumes:
  postgres_data:
