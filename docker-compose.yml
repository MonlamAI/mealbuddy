services:
  postgres:
    image: postgres:16-alpine
    container_name: mealbuddy-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mealbuddy}
      POSTGRES_USER: ${POSTGRES_USER:-mealbuddy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mealbuddy} -d ${POSTGRES_DB:-mealbuddy}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
