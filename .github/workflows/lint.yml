name: linter

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
      - version
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos
      - version

permissions:
  contents: write

jobs:
  backend-lint:
    name: Backend Lint (Laravel)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint
        run: composer lint


  frontend-lint:
    name: Frontend Lint (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm install

      - name: Format Frontend
        run: npm run format

      - name: Lint Frontend
        run: npm run lint