name: Continuous Delivery

on:
  push:
    branches:
      - main
      - master
      - develop
      - workos
      - version

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mealbuddy
          POSTGRES_USER: mealbuddy
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mealbuddy -d mealbuddy"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          extensions: pdo_pgsql

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
        working-directory: backend

      - name: Run Tests
        run: ./vendor/bin/pest
        working-directory: backend


  deploy:
    name: Deploy to EC2 (ONLY VERSION BRANCH)
    needs: test
    runs-on: ubuntu-latest

    # CRITICAL FIX: ONLY VERSION BRANCH CAN DEPLOY
    if: github.ref == 'refs/heads/version' && github.event_name == 'push'

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}

          script: |
            cd ~/mealbuddy

            echo " Deploying VERSION branch..."

            git fetch origin
            git reset --hard origin/version

            docker compose build frontend backend
            docker compose up -d --force-recreate frontend backend

            docker image prune -f