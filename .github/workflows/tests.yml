name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
      - version
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos
      - version

jobs:
  backend-tests:
    name: Backend Tests (Laravel)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mealbuddy
          POSTGRES_USER: mealbuddy
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mealbuddy -d mealbuddy"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          extensions: pdo_pgsql

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Laravel Environment
        run: |
          cp .env.example .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env

      - name: Clear Laravel Cache
        run: |
          php artisan config:clear
          php artisan cache:clear

      - name: Run Migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: mealbuddy
          DB_USERNAME: mealbuddy
          DB_PASSWORD: secret

      - name: Run Pest Tests
        run: ./vendor/bin/pest

  frontend-tests:
    name: Frontend Build & Test (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build